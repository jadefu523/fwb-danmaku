<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>看我笑話 · 大螢幕</title>
<style>
  :root{ --bowen:#3FE0D0; --jie:#FFB23E; --side:24vw; }
  *{box-sizing:border-box;}
  html,body{margin:0; height:100%; background:#000; overflow:hidden;
    font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;}
  /* 彈幕舞台：右邊界縮到側欄左緣，overflow 藏起 → 彈幕永遠打不到側欄 */
  #stage{position:fixed; top:0; left:0; bottom:0; right:var(--side); overflow:hidden;}

  .danmaku{position:absolute; left:100%; white-space:nowrap; font-weight:800;
    text-shadow:0 2px 10px #000, 0 0 4px #000, 0 0 2px #000; will-change:transform;}
  .danmaku .conn{opacity:.7;}   /* 固定連接詞略壓深，凸顯觀眾投稿的詞（對比不大）*/

  /* ===== 右側欄（不會被彈幕打到）===== */
  #sidebar{position:fixed; top:0; right:0; bottom:0; width:var(--side); z-index:10;
    background:#080808; border-left:2px solid #1c1c1c; overflow:hidden;
    display:flex; flex-direction:column; align-items:center; padding:4vh 1.5vw;}

  /* QR Code（上方）*/
  #qrWrap{display:flex; flex-direction:column; align-items:center; width:100%;}
  #qrBox{position:relative; width:74%; aspect-ratio:1; border-radius:16px; overflow:hidden; background:#fff;
    box-shadow:0 0 24px rgba(0,0,0,.6);}
  #qrBox img,#qrBox svg{position:absolute; inset:0; width:100%; height:100%; object-fit:contain; background:#fff;}
  #qrPlaceholder{position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;
    background:#151515; color:#777; border:2px dashed #333; text-align:center; font-weight:800; font-size:2.6vh; gap:1vh;}
  #qrPlaceholder span{font-size:1.6vh; color:#555; font-weight:600;}
  #qrCap{margin-top:2.4vh; font-size:3vh; font-weight:900; color:#fff; letter-spacing:.05em; text-shadow:0 2px 8px #000; text-align:center;}
  #qrCap small{display:block; font-size:1.9vh; color:#9aa; font-weight:600; margin-top:.6vh;}

  /* 拔河 bar（下方）*/
  #tug{position:relative; width:100%; height:46vh; margin-top:auto;}
  #bar{position:absolute; top:12%; bottom:12%; left:50%; width:1.6vh; transform:translateX(-50%);
    border-radius:10px; overflow:hidden; background:#1a1a1a; box-shadow:0 0 0 2px #000; z-index:5;}
  #fillJie{position:absolute; top:0; left:0; right:0; background:var(--jie);}
  #fillBowen{position:absolute; bottom:0; left:0; right:0; background:var(--bowen);}
  #fillJie,#fillBowen{transition:height .6s cubic-bezier(.22,1,.36,1);}

  .avatar{position:absolute; left:50%; width:9vh; height:9vh; border-radius:50%; z-index:6;
    transform:translateX(-50%); overflow:hidden; background:#111; border:0.5vh solid #fff;
    box-shadow:0 0 20px rgba(0,0,0,.75);}
  .avatar img{width:100%; height:100%; object-fit:cover; display:block;}
  #avJie{top:-2vh; border-color:var(--jie);}
  #avBowen{border-color:var(--bowen); transition:bottom .6s cubic-bezier(.22,1,.36,1);}
  .count{position:absolute; left:50%; transform:translateX(-50%); font-weight:900; font-size:3vh; z-index:6; text-shadow:0 2px 8px #000;}
  #cntJie{top:7.5vh; color:var(--jie);}
  #cntBowen{color:var(--bowen); transition:bottom .6s cubic-bezier(.22,1,.36,1);}

  #fsBtn,#cogBtn{position:fixed; bottom:12px; z-index:50; background:#111; color:#777;
    border:1px solid #333; border-radius:8px; padding:8px 12px; font-size:13px; cursor:pointer;}
  #fsBtn{right:14px;} #cogBtn{right:120px;}
  #stat{position:fixed; left:12px; bottom:10px; color:#444; font-size:12px; font-family:monospace; z-index:50;}

  #panel{position:fixed; right:14px; bottom:50px; width:344px; max-height:82vh; overflow:auto; z-index:60;
    background:#111; border:1px solid #333; border-radius:14px; padding:16px 16px 18px; display:none; color:#ddd;}
  #panel.open{display:block;}
  #panel h3{margin:2px 0 10px; font-size:15px; color:#fff;}
  #panel .hint{font-size:11px; color:#777; line-height:1.5; margin:0 0 12px;}
  #panel label{display:block; font-size:12px; color:#9aa; margin:12px 0 4px;}
  #panel input{width:100%; font-size:14px; padding:8px 10px; border-radius:8px; border:1px solid #333; background:#000; color:#fff;}
  #panel .row{display:flex; gap:6px;} #panel .row>div{flex:1;}
  #panel .scenes{display:flex; gap:6px; margin-top:6px;}
  #panel .scenes button{flex:1; font-size:13px; font-weight:700; padding:9px 0; border-radius:8px; border:1px solid #333; background:#000; color:#ccc; cursor:pointer;}
  #panel .acts{display:flex; gap:8px; margin-top:16px;}
  #panel .acts button{flex:1; font-size:14px; font-weight:800; padding:10px 0; border:none; border-radius:8px; cursor:pointer;}
  #saveBtn{background:#fff; color:#000;} #resetBtn{background:#000; color:#888; border:1px solid #333 !important;}
  #panel .keys{font-size:11px; color:#666; margin-top:14px; line-height:1.6;}
</style>
</head>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="blocklist.js"></script>
  <script>
  firebase.initializeApp(firebaseConfig);
  const subsRef = firebase.database().ref("rooms/" + ROOM + "/submissions");

  /* ===== 設定（localStorage 記住）===== */
  const DEFAULTS = {
    speedGroups: [120, 170, 230],
    fontGroups:  [3.6, 4.8, 6.5],
    bowenColors: ['#3FE0D0','#2BB8D9','#7CF0CE'],
    jieColors:   ['#FFB23E','#FF8C42','#FFD166'],
    lanes: 12, maxOnScreen: 60, dripMs: 70, laneGap: 1.0,
  };
  const SCENES = {
    calm:   { maxOnScreen: 25,  dripMs: 160 },
    normal: { maxOnScreen: 60,  dripMs: 70  },
    riot:   { maxOnScreen: 130, dripMs: 20  },
  };
  const LS = 'dmcfg_v4';
  function loadCfg(){ try{ return Object.assign({}, DEFAULTS, JSON.parse(localStorage.getItem(LS)||'{}')); }catch(e){ return {...DEFAULTS}; } }
  let cfg = loadCfg();

  const pick = a => (a && a.length) ? a[Math.floor(Math.random()*a.length)] : null;
  const parseNums   = s => String(s).split(/[,\s]+/).map(Number).filter(n=>!isNaN(n)&&n>0);
  const parseColors = s => String(s).split(/[,\s]+/).map(x=>x.trim()).filter(Boolean);

  function applyTheme(){
    document.documentElement.style.setProperty('--bowen', cfg.bowenColors[0] || '#3FE0D0');
    document.documentElement.style.setProperty('--jie',   cfg.jieColors[0]   || '#FFB23E');
  }
  applyTheme();

  /* ===== 彈幕引擎 ===== */
  const stage = document.getElementById('stage');
  const queue = [];
  let onScreen = 0, paused = false;
  let laneBusyUntil = new Array(cfg.lanes).fill(0);

  function laneCenter(i){
    const top = 0.05, bottom = 0.95, h = (bottom - top) / cfg.lanes;
    return (top + (i + 0.5) * h) * window.innerHeight;
  }
  // 隨機挑一條「現在是空的」軌道（→ 鋪滿整個高度、散開）；全忙就回 -1，這條先排隊、不硬塞 → 保證不重疊
  function pickLane(now){
    const free = [];
    for(let i = 0; i < cfg.lanes; i++) if(laneBusyUntil[i] <= now) free.push(i);
    if(free.length) return free[Math.floor(Math.random() * free.length)];
    return -1;
  }
  function esc(s){ return (s||'').replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
  function sentence(it){
    const c = s => `<span class="conn">${s}</span>`;   // 固定連接詞，顏色壓深
    return `${esc(it.nick)}${c('想看到')}${esc(it.target)}${c('當')}${esc(it.adj)}${c('的')}${esc(it.role)}`;
  }
  // 回傳 true=已放出；false=目前沒有空軌道，這條留在佇列等下一輪（不硬塞、不重疊）
  function spawn(it){
    const now = performance.now();
    const lane = pickLane(now);
    if(lane < 0) return false;

    const el = document.createElement('div');
    el.className = 'danmaku';
    el.style.fontSize = pick(cfg.fontGroups) + 'vh';
    el.style.color = pick(it.target === '柏文' ? cfg.bowenColors : cfg.jieColors);
    el.innerHTML = sentence(it);
    el.style.visibility = 'hidden';
    stage.appendChild(el);

    const w = el.offsetWidth, h = el.offsetHeight;
    // 貼齊軌道中心（不再抖動）；夾在畫面內
    let y = laneCenter(lane) - h / 2;
    y = Math.max(2, Math.min(window.innerHeight - h - 2, y));
    el.style.top = y + 'px';
    el.style.visibility = 'visible';

    const speed = pick(cfg.speedGroups) || 170;
    const stageW = stage.clientWidth;
    const dist = stageW + w, dur = dist / speed * 1000;

    // 同軌道防追撞：就算下一條抽到最快速度、也不會在前一條離場前追上。
    // 依速度差算安全佔用時間；gapPx 給一個字高的水平呼吸間距。
    const Vmax = Math.max.apply(null, cfg.speedGroups.concat(speed));
    const gapPx = h * (cfg.laneGap || 1);
    const busyMs = ((stageW + w + gapPx) / speed - stageW / Vmax) * 1000;
    laneBusyUntil[lane] = now + Math.max(busyMs, 0);

    onScreen++;
    const mEl = subMap.get(it.key); if(mEl) mEl.el = el;
    el.style.transition = `transform ${dur}ms linear`;
    requestAnimationFrame(() => { el.style.transform = `translateX(${-dist}px)`; });
    el.addEventListener('transitionend', () => {
      el.remove(); onScreen--;
      const m = subMap.get(it.key); if(m) m.el = null;
    });
    return true;
  }
  (function dripLoop(){
    if(!paused){
      let budget = 4;
      while(budget-- && queue.length && onScreen < cfg.maxOnScreen){
        if(spawn(queue[0])) queue.shift();
        else break;   // 沒空軌道 → 這輪停，下輪再試
      }
    }
    setTimeout(dripLoop, cfg.dripMs);
  })();

  /* ===== 計分 + 垂直拔河 ===== */
  let nJie = 0, nBowen = 0;
  const subMap = new Map();   // key -> {target, vis, el}（審核時找得到、撤得掉）
  const tug = document.getElementById('tug');
  const fillJie = document.getElementById('fillJie'), fillBowen = document.getElementById('fillBowen');
  const avBowen = document.getElementById('avBowen'), cntBowen = document.getElementById('cntBowen'), cntJie = document.getElementById('cntJie');
  function updateBar(){
    const H = tug.clientHeight || 1;
    const total = nJie + nBowen, ratio = total ? nBowen / total : 0.5;
    fillBowen.style.height = (ratio * 100) + '%';
    fillJie.style.height = ((1 - ratio) * 100) + '%';
    // 前線在 bar 內 12%~88% 之間移動（對齊 #bar 的 top/bottom:12%）
    const edge = 0.12, usable = 0.76, y = (edge + ratio * usable) * H;  // 距 tug 底的 px
    const bH = avBowen.offsetHeight || 0;
    avBowen.style.bottom = (y - bH / 2) + 'px';
    cntBowen.style.bottom = (y + bH / 2 + 4) + 'px';
    cntJie.textContent = nJie; cntBowen.textContent = nBowen;
  }
  function bump(target, d){ if(target === '柏文') nBowen += d; else nJie += d; updateBar(); }
  updateBar();

  // 顯示規則：手動擋下→不顯示；手動放行→顯示；沒人工處理過→乾淨就顯示、踩黑名單就壓著
  function decideVisible(it){
    if(it.status === 'blocked') return false;
    if(it.status === 'approved') return true;
    return !hitsBlocklist(it);
  }

  /* ===== Firebase：只收開頁之後的新投稿 ===== */
  const startAt = Date.now();
  const liveQ = subsRef.orderByChild('ts').startAt(startAt);

  liveQ.on('child_added', snap => {
    const it = snap.val(); if(!it) return;
    const key = snap.key, vis = decideVisible(it);
    subMap.set(key, { target: it.target, vis, el: null });
    if(vis){ bump(it.target, +1); queue.push({ key, ...it }); }
  });

  liveQ.on('child_changed', snap => {
    const it = snap.val(); if(!it) return;
    const key = snap.key, m = subMap.get(key); if(!m) return;
    const vis = decideVisible(it);
    if(m.vis && !vis){
      bump(m.target, -1);
      if(m.el){ m.el.remove(); m.el = null; onScreen--; }
      const qi = queue.findIndex(x => x.key === key); if(qi >= 0) queue.splice(qi, 1);
    } else if(!m.vis && vis){
      bump(m.target, +1); queue.push({ key, ...it });
    }
    m.vis = vis;
  });

  function clearScreen(){
    stage.querySelectorAll('.danmaku').forEach(el => el.remove());
    queue.length = 0; onScreen = 0; subMap.forEach(m => m.el = null);
  }
  firebase.database().ref('rooms/' + ROOM + '/control/clearAt').on('value', s => {
    const t = s.val(); if(t && t > startAt) clearScreen();
  });

  /* ===== 控制台 ===== */
  const $ = id => document.getElementById(id);
  const panel = $('panel');
  function fillForm(){
    $('f_speed').value = cfg.speedGroups.join(', ');
    $('f_font').value  = cfg.fontGroups.join(', ');
    $('f_bowen').value = cfg.bowenColors.join(', ');
    $('f_jie').value   = cfg.jieColors.join(', ');
    $('f_lanes').value = cfg.lanes; $('f_max').value = cfg.maxOnScreen;
    $('f_drip').value = cfg.dripMs;
  }
  function readForm(){
    cfg.speedGroups = parseNums($('f_speed').value);
    cfg.fontGroups  = parseNums($('f_font').value);
    cfg.bowenColors = parseColors($('f_bowen').value);
    cfg.jieColors   = parseColors($('f_jie').value);
    const lanes = parseInt($('f_lanes').value) || cfg.lanes;
    if(lanes !== cfg.lanes){ cfg.lanes = lanes; laneBusyUntil = new Array(lanes).fill(0); }
    cfg.maxOnScreen = parseInt($('f_max').value) || cfg.maxOnScreen;
    cfg.dripMs = parseInt($('f_drip').value) || cfg.dripMs;
    localStorage.setItem(LS, JSON.stringify(cfg)); applyTheme();
  }
  function setScene(name){
    const s = SCENES[name]; if(!s) return;
    cfg.maxOnScreen = s.maxOnScreen; cfg.dripMs = s.dripMs;
    $('f_max').value = s.maxOnScreen; $('f_drip').value = s.dripMs;
    localStorage.setItem(LS, JSON.stringify(cfg));
  }
  function togglePanel(){ panel.classList.toggle('open'); if(panel.classList.contains('open')) fillForm(); }
  $('cogBtn').onclick = togglePanel;
  $('saveBtn').onclick = () => { readForm(); panel.classList.remove('open'); };
  $('resetBtn').onclick = () => { cfg = {...DEFAULTS}; laneBusyUntil = new Array(cfg.lanes).fill(0); localStorage.setItem(LS, JSON.stringify(cfg)); applyTheme(); fillForm(); };
  document.querySelectorAll('.scenes button').forEach(b => b.onclick = () => setScene(b.dataset.scene));

  /* ===== 全螢幕 + 快捷鍵 ===== */
  const fsBtn = $('fsBtn');
  if(!document.documentElement.requestFullscreen) fsBtn.style.display = 'none';
  function toggleFs(){ document.fullscreenElement ? document.exitFullscreen() : document.documentElement.requestFullscreen(); }
  fsBtn.onclick = toggleFs;
  addEventListener('keydown', e => {
    if(e.target.matches('input,textarea,select')) return;
    if(e.repeat) return;
    const k = e.key.toLowerCase();
    if(k === 'f') toggleFs();
    else if(k === 'c') togglePanel();
    else if(k === 'x') clearScreen();
    else if(e.key === ' '){ e.preventDefault(); paused = !paused; }
    else if(e.key === '1') setScene('calm');
    else if(e.key === '2') setScene('normal');
    else if(e.key === '3') setScene('riot');
  });

  addEventListener('resize', updateBar);
  setInterval(() => { $('stat').textContent =
    `佇列 ${queue.length} · 螢幕 ${onScreen} · 柏文 ${nBowen} / 傑哥 ${nJie}` + (paused ? ' · ⏸' : ''); }, 300);
  </script>
</body>
</html>
